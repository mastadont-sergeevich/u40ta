services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${DB_DATABASE}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run start:dev"
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app                    # всё, включая package.json
      - ./email-attachments:/email-attachments
      - backend_node_modules:/app/node_modules  # том вместо локальных node_modules
    environment:
      - NODE_ENV=${NODE_ENV}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      # ПОЧТОВЫЕ НАСТРОЙКИ
      - EMAIL_IMAP_USER=${EMAIL_IMAP_USER}
      - EMAIL_IMAP_PASSWORD=${EMAIL_IMAP_PASSWORD}
      - EMAIL_IMAP_HOST=${EMAIL_IMAP_HOST}
      - EMAIL_IMAP_PORT=${EMAIL_IMAP_PORT}
      - EMAIL_IMAP_TLS=${EMAIL_IMAP_TLS}
      - EMAIL_SMTP_USER=${EMAIL_SMTP_USER}
      - EMAIL_SMTP_PASSWORD=${EMAIL_SMTP_PASSWORD}
      - EMAIL_SMTP_HOST=${EMAIL_SMTP_HOST}
      - EMAIL_SMTP_PORT=${EMAIL_SMTP_PORT}
      - EMAIL_SMTP_SECURE=${EMAIL_SMTP_SECURE}
      - EMAIL_SMTP_FROM=${EMAIL_SMTP_FROM}
      - EMAIL_ATTACHMENTS_PATH=${EMAIL_ATTACHMENTS_PATH}
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app                   # всё
      - frontend_node_modules:/app/node_modules  # том
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules: